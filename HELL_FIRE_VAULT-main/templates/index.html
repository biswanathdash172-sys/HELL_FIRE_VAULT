<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hellfire Vault | Upside Down OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CSS HACKS AND RETRO VIBES 
           ========================================= */
        :root {
            --neon-red: #ff003c;
            --neon-green: #00ff00;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-red);
            font-family: 'Press Start 2P', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* The CRT overlay hack. Gives it the 1986 TV look */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none; /* Crucial so we can still click buttons underneath */
            z-index: 999;
        }

        .arcade-cabinet {
            border: 4px solid var(--neon-red);
            box-shadow: 0 0 20px var(--neon-red), inset 0 0 20px var(--neon-red);
            padding: 30px;
            max-width: 800px;
            width: 100%;
            background: #111;
            position: relative;
        }

        h1 {
            text-align: center;
            text-shadow: 0 0 10px var(--neon-red);
            font-size: 24px;
            animation: flicker 2s infinite alternate;
        }

        /* Console output box */
        #terminal {
            background: #000;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: 0 0 10px var(--neon-green);
            font-size: 12px;
            line-height: 1.5;
        }

        /* Buttons styling */
        .btn {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 15px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .btn-danger {
            color: var(--neon-red);
            border-color: var(--neon-red);
        }
        
        .btn-danger:hover {
            background: var(--neon-red);
            color: #000;
            box-shadow: 0 0 15px var(--neon-red);
        }

        .file-upload-wrapper {
            margin: 20px 0;
            text-align: center;
        }

        input[type="file"] {
            color: var(--neon-green);
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 10px var(--neon-red); opacity: 1; }
            20%, 24%, 55% { text-shadow: none; opacity: 0.8; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="arcade-cabinet">
        <h1>HELLFIRE CLUB VAULT</h1>
        
        <div id="terminal">
            > SYSTEM INITIALIZED...<br>
            > AWAITING WALLET CONNECTION...<br>
        </div>

        <button id="btn-connect" class="btn">Connect Wallet</button>

        <div class="file-upload-wrapper">
            <input type="file" id="csv-file" accept=".csv">
        </div>

        <button id="btn-process" class="btn btn-danger">Upload & Process Debts</button>
        
        <div id="action-panel" class="hidden">
            <button id="btn-seal" class="btn">Lock on Blockchain</button>
            <a id="btn-download" href="#" class="btn btn-danger" style="display:block; text-align:center; text-decoration:none;">Share to Friends on LAN</a>
        </div>
    </div>

    <script>
        /* =========================================
           FRONTEND LOGIC (Vanilla JS baby!)
           ========================================= */
        
        const terminal = document.getElementById('terminal');
        const btnConnect = document.getElementById('btn-connect');
        const btnProcess = document.getElementById('btn-process');
        const btnSeal = document.getElementById('btn-seal');
        const actionPanel = document.getElementById('action-panel');
        const downloadLink = document.getElementById('btn-download');

        // Helper to print to our retro console
        function printToTerminal(msg, isError = false) {
            const color = isError ? 'var(--neon-red)' : 'var(--neon-green)';
            terminal.innerHTML += `<span style="color: ${color}">> ${msg}</span><br>`;
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll to bottom
            
            // Hacky beep sound — native AudioContext, no MP3 imports needed!
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.type = 'square';
            osc.frequency.setValueAtTime(isError ? 150 : 600, ctx.currentTime);
            osc.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        // 1. Connect Wallet (Fake it for the 12-hour demo)
        btnConnect.addEventListener('click', () => {
            printToTerminal("Connecting to Web3...");
            setTimeout(() => {
                printToTerminal("Wallet Connected: 0x8F4c...9A21");
                btnConnect.innerText = "Wallet Linked";
                btnConnect.disabled = true;
                btnConnect.style.borderColor = "#555";
                btnConnect.style.color = "#555";
            }, 800);
        });

        // 2. Upload and Process 
        btnProcess.addEventListener('click', async () => {
            const fileInput = document.getElementById('csv-file');
            if (fileInput.files.length === 0) {
                printToTerminal("ERROR: No CSV file selected!", true);
                return;
            }

            // The required loading message from the PDF!
            printToTerminal("PROCESSING THROUGH THE UPSIDE DOWN...");
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                // Hitting our Flask Backend API
                const response = await fetch('/api/process', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (response.ok) {
                    printToTerminal(`SUCCESS! Calc Time: ${data.calculation_time_seconds}s`);
                    printToTerminal(`Briefing generated. Ready for distribution.`);
                    
                    // Setup the download link for Layer 3 LAN sharing
                    downloadLink.href = data.download_url;
                    
                    // Show the hidden buttons
                    actionPanel.classList.remove('hidden');
                    btnProcess.classList.add('hidden'); // hide process button to prevent spamming
                } else {
                    printToTerminal(`SERVER ERROR: ${data.error}`, true);
                }
            } catch (err) {
                printToTerminal(`CONNECTION FAILED. IS THE FLASK SERVER RUNNING?`, true);
                console.error(err);
            }
        });

        // 3. Fake Blockchain Lock
        btnSeal.addEventListener('click', () => {
            printToTerminal("Encrypting ledger data...");
            setTimeout(() => {
                // Generate a fake hash string on the fly
                const hash = Array.from({length: 40}, () => Math.floor(Math.random()*16).toString(16)).join('');
                printToTerminal(`LOCKED. TX Hash: 0x${hash}`);
                btnSeal.disabled = true;
                btnSeal.style.borderColor = "#555";
                btnSeal.style.color = "#555";
            }, 1200);
        });
    </script>
</body>
</html>
