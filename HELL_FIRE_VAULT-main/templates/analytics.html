<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hellfire Vault | Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --dim-blue: rgba(0, 210, 255, 0.2);
            --neon-red: #ff3e3e;
            --deep-red: #8b0000;
            --bg-dark: #000000;
            --glass-bg: rgba(20, 30, 40, 0.4);
            --panel-border: rgba(0, 210, 255, 0.3);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('/static/lab_corridor.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.25);
            z-index: -1;
        }

        .viewport {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .frame {
            width: 100%;
            height: 60px;
            background: linear-gradient(180deg, #333 0%, #111 50%, #222 100%);
            border: 2px solid #444;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.1), 0 0 20px var(--dim-blue);
        }

        .frame-nav {
            display: flex;
            gap: 40px;
        }

        .nav-item {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-item:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .analytics-container {
            background: var(--glass-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px var(--dim-blue);
        }

        .header-title {
            font-family: 'Creepster', cursive;
            font-size: 2.5rem;
            color: var(--neon-red);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px var(--deep-red);
        }

        .chart-wrapper {
            width: 100%;
            height: 500px;
            position: relative;
        }

        .no-data {
            text-align: center;
            padding: 100px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--panel-border);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon-blue);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="viewport">
        <div class="frame">
            <div class="frame-nav">
                <a href="/dashboard" class="nav-item"><span>▣</span> DASHBOARD</a>
                <a href="/analytics" class="nav-item"><span>📈</span> ANALYTICS</a>
                <a href="/history" class="nav-item"><span>▤</span> LEDGER HISTORY</a>
                <a href="/login" class="nav-item"><span>◒</span> SIGN IN / UP</a>
            </div>
        </div>

        <div class="analytics-container">
            <div class="header-title">THE VOID ANALYSIS</div>
            
            <div id="data-container">
                <div class="chart-wrapper">
                    <canvas id="debtChart"></canvas>
                </div>

                <div class="stats-grid" id="statsGrid">
                    <!-- Stats cards will be injected here -->
                </div>
            </div>

            <div id="no-data-msg" class="no-data" style="display: none;">
                <p>SIGNAL LOST. NO DATA DETECTED IN THE VOID.</p>
                <p style="font-size: 0.8rem;">Upload a ledger in the Dashboard to begin the analysis.</p>
            </div>
        </div>
    </div>

    <script>
        async function loadAnalytics() {
            try {
                const response = await fetch('/api/latest-stats');
                if (!response.ok) throw new Error('No data');
                
                const data = await response.json();
                renderChart(data.balances);
                renderStats(data);
            } catch (error) {
                document.getElementById('data-container').style.display = 'none';
                document.getElementById('no-data-msg').style.display = 'block';
            }
        }

        function renderChart(balances) {
            const ctx = document.getElementById('debtChart').getContext('2d');
            const labels = Object.keys(balances);
            const values = Object.values(balances);
            
            // Highlight debtors in red and creditors in blue
            const backgroundColors = values.map(v => v < 0 ? 'rgba(255, 62, 62, 0.6)' : 'rgba(0, 210, 255, 0.6)');
            const borderColors = values.map(v => v < 0 ? '#ff3e3e' : '#00d2ff');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Net Balance (₹)',
                        data: values,
                        backgroundColor: backgroundColors,
                        borderColor: borderColors,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#fff' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#fff' }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function renderStats(data) {
            const grid = document.getElementById('statsGrid');
            const balances = Object.values(data.balances);
            const totalVolume = data.transactions.reduce((sum, t) => sum + t.amount, 0);
            const debtorCount = balances.filter(v => v < -0.01).length;
            const creditorCount = balances.filter(v => v > 0.01).length;

            grid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">₹${totalVolume.toFixed(2)}</div>
                    <div class="stat-label">Total Debt Volume</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.transactions.length}</div>
                    <div class="stat-label">Optimized Transactions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${debtorCount}</div>
                    <div class="stat-label">Active Debtors</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${creditorCount}</div>
                    <div class="stat-label">Active Creditors</div>
                </div>
            `;
        }

        window.onload = loadAnalytics;
    </script>
</body>
</html>
