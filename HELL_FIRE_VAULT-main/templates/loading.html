<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entering the Void...</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #ff0011;
            font-family: 'Creepster', cursive;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .loading-text {
            font-size: 3rem;
            letter-spacing: 5px;
            animation: flicker 2s infinite;
            text-shadow: 0 0 20px #ff0011;
        }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: #2a0000;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #ff0011;
            box-shadow: 0 0 15px #ff0011;
            width: 0%;
            animation: load 3s linear forwards;
        }

        .vines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 10;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="vines"></div>
    <div class="loading-text">WAKING THE HIVE...</div>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <script>
        setTimeout(() => {
            window.location.href = '/dashboard';
        }, 3000);
    </script>
</body>
</html>
