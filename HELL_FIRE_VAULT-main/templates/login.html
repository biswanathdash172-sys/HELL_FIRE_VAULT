<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Login | Hellfire Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --dim-blue: rgba(0, 210, 255, 0.2);
            --neon-red: #ff3e3e;
            --deep-red: #8b0000;
            --bg-dark: #000000;
            --glass-bg: rgba(20, 30, 40, 0.6);
            --panel-border: rgba(255, 62, 62, 0.4);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('/static/lab_corridor.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.5);
            z-index: 0;
        }

        .ambient-bg::after {
            content: '';
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: rgba(255, 0, 0, 0.2); /* Reddish vibe */
            z-index: 1;
        }

        /* Glitchy VHS overlay */
        .vhs-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: repeating-linear-gradient(
                transparent, transparent 2px, rgba(0,0,0,0.1) 3px
            );
            pointer-events: none;
            z-index: 5;
        }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(255, 62, 62, 0.2);
            position: absolute; top: 0; left:0;
            animation: scan 4s linear infinite;
            z-index: 6;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 900px;
            height: 500px;
            background: var(--glass-bg);
            border: 2px solid var(--panel-border);
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2), inset 0 0 30px rgba(255, 0, 0, 0.1);
            backdrop-filter: blur(15px);
            display: flex;
            overflow: hidden;
        }

        /* Left Side: Image Square */
        .image-side {
            width: 50%;
            height: 100%;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid rgba(255, 62, 62, 0.2);
            background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.05));
        }

        .image-square {
            width: 100%;
            aspect-ratio: 1/1;
            /* Using the local WhatsApp image provided by the user */
            background: url('/static/WhatsApp Image 2026-03-14 at 1.56.09 AM.jpeg') no-repeat center center;
            background-size: cover;
            border: 2px solid var(--neon-red);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 62, 62, 0.4);
            filter: contrast(1.2) drop-shadow(0 0 10px rgba(255, 0, 0, 0.5));
            position: relative;
        }

        .image-square::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 0, 0, 0.15);
            pointer-events: none;
        }

        /* Right Side: Form */
        .form-side {
            width: 50%;
            height: 100%;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            font-family: 'Creepster', cursive;
            font-size: 3rem;
            color: var(--neon-red);
            text-shadow: 0 0 15px var(--neon-red);
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-align: center;
        }

        .login-subtext {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 40px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flash-message {
            color: var(--neon-red);
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 15px;
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 0 0 5px var(--neon-red);
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 62, 62, 0.3);
            border-radius: 4px;
            padding: 12px 15px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #4d0000 0%, #8b0000 100%);
            border: 1px solid var(--neon-red);
            color: #fff;
            padding: 15px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.2);
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #8b0000 0%, #cc0000 100%);
            box-shadow: 0 0 30px rgba(255, 62, 62, 0.4);
            transform: translateY(-2px);
        }

        .auth-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--neon-red);
            text-decoration: none;
            transition: 0.2s;
        }

        .auth-footer a:hover {
            color: #ff8080;
            text-shadow: 0 0 10px var(--neon-red);
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div class="vhs-overlay"></div>
    <div class="scanline"></div>

    <div class="login-container">
        <!-- Left Side: Character Image -->
        <div class="image-side">
            <div class="image-square"></div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="form-side">
            <div class="login-header">HELLFIRE VAULT</div>
            <div class="login-subtext">AUTHORIZED PERSONNEL ONLY</div>

            {% if error %}
            <div class="flash-message">⚠ {{ error }}</div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="input-group">
                    <label>Agent Operative ID (Email/Username)</label>
                    <input type="text" name="username" placeholder="e.g. 011_El" required>
                </div>
                
                <div class="input-group">
                    <label>Clearance Code (Password)</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">ENTER THE VOID</button>
            </form>

            <div class="auth-footer">
                Forgotten coordinates? <a href="#">Retransmit Signal</a>
            </div>
        </div>
    </div>

</body>
</html>
